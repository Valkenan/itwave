<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>It-Force | Login</title>

<style>
:root {
    --bg-1: #072a3a;
    --bg-2: #0a4f5e;
    --card: rgba(248, 250, 252, 0.9);
    --card-border: rgba(255, 255, 255, 0.5);
    --text: #132533;
    --muted: #5e6d7b;
    --accent: #0f766e;
    --danger: #c2410c;
    --success: #166534;
    --input-bg: rgba(255, 255, 255, 0.85);
}

[data-theme="dark"] {
    --bg-1: #020617;
    --bg-2: #0f172a;
    --card: rgba(30, 41, 59, 0.85);
    --card-border: rgba(255, 255, 255, 0.1);
    --text: #f8fafc;
    --muted: #94a3b8;
    --accent: #0d9488;
    --input-bg: rgba(15, 23, 42, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh; display: grid; place-items: center; padding: 22px;
    font-family: "Trebuchet MS", "Segoe UI", sans-serif; color: var(--text);
    background: linear-gradient(130deg, var(--bg-1), var(--bg-2));
    overflow: hidden; transition: all 0.3s ease;
}

body::before, body::after {
    content: ""; position: fixed; width: 38vmax; height: 38vmax;
    border-radius: 50%; filter: blur(22px); z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
}
body::before { top: -14vmax; left: -10vmax; background: rgba(15, 118, 110, 0.2); }
body::after { bottom: -18vmax; right: -12vmax; background: rgba(255, 255, 255, 0.1); animation-delay: 1.6s; }

@keyframes floatOrb { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-12px) scale(1.05); } }

.top-controls {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    display: flex; gap: 10px; align-items: center;
}
.lang-btn, .theme-btn {
    background: var(--card); border: 1px solid var(--card-border);
    color: var(--text); padding: 8px 12px; border-radius: 8px;
    cursor: pointer; font-weight: bold; backdrop-filter: blur(5px);
    transition: 0.3s;
}
.lang-btn:hover, .theme-btn:hover { background: var(--accent); color: white; }

.card {
    position: relative; z-index: 1; width: min(100%, 420px);
    border-radius: 20px; border: 1px solid var(--card-border);
    background: var(--card); backdrop-filter: blur(14px);
    padding: 28px; box-shadow: 0 24px 45px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
}

.title { text-align: center; margin-bottom: 8px; font-size: 2rem; }
.subtitle { text-align: center; color: var(--muted); margin-bottom: 22px; font-size: 0.95rem; }

.field { margin-bottom: 14px; }
.field label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 600; }
.input-wrap { position: relative; }

input[type="email"], input[type="password"], input[type="text"] {
    width: 100%; border: 1px solid var(--muted); background: var(--input-bg); color: var(--text);
    border-radius: 12px; padding: 12px; font-size: 0.96rem; transition: all 0.2s;
}
input[type="password"] { padding-right: 88px; }
[dir="rtl"] input[type="password"] { padding-right: 12px; padding-left: 88px; }

input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.18); }

.eye {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    height: 34px; padding: 0 10px; border-radius: 10px;
    border: 1px solid var(--muted); background: var(--card); color: var(--text);
    font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
[dir="rtl"] .eye { right: auto; left: 8px; }
.eye:hover { border-color: var(--accent); color: var(--accent); }

.agree { display: flex; align-items: center; gap: 10px; font-size: 0.92rem; color: var(--muted); margin: 6px 0 16px; }

.main-btn {
    width: 100%; border: none; border-radius: 12px; padding: 12px;
    font-size: 1rem; font-weight: 700; color: #fff;
    background: var(--accent); cursor: pointer; transition: all 0.2s; margin-bottom: 15px;
}
.main-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

.message { margin: 0 0 10px; text-align: center; font-size: 0.93rem; min-height: 22px; }
.error { color: var(--danger); }
.success { color: var(--success); }

.toggle-link { display: block; text-align: center; font-size: 0.9rem; color: var(--accent); font-weight: bold; cursor: pointer; }
.helper-text { font-size: 0.75rem; color: var(--muted); margin-top: 4px; display: block; }
.creator { text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--card); position: relative; z-index: 1;}
</style>
</head>

<body>

<div class="top-controls">
    <select class="lang-btn" id="langSelect" onchange="changeLang(this.value)">
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="ar">العربية</option>
    </select>
    <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌙</button>
</div>

<div class="card">
    <h1 class="title" id="formTitle" data-i18n="welcome">Welcome Back</h1>
    <p class="subtitle" id="formSubtitle" data-i18n="signin_sub">Sign in to continue to your workspace.</p>

    <div class="field" id="usernameField" style="display: none;">
        <label for="username" data-i18n="username">Username</label>
        <div class="input-wrap"><input type="text" id="username" autocomplete="off"></div>
    </div>

    <div class="field">
        <label for="email" data-i18n="email">Email</label>
        <div class="input-wrap"><input type="email" id="email" autocomplete="email"></div>
    </div>

    <div class="field">
        <label for="code" data-i18n="password">Password</label>
        <div class="input-wrap">
            <input type="password" id="code" autocomplete="current-password">
            <button class="eye" type="button" onclick="togglePassword('code', this)" data-i18n="show">Show</button>
        </div>
        <span class="helper-text" data-i18n="pass_rule">Must be 8+ chars with Uppercase, Lowercase, Number & Symbol.</span>
    </div>

    <div class="field" id="confirmPasswordField" style="display: none;">
        <label for="confirmCode" data-i18n="confirm_pass">Confirm Password</label>
        <div class="input-wrap">
            <input type="password" id="confirmCode">
            <button class="eye" type="button" onclick="togglePassword('confirmCode', this)" data-i18n="show">Show</button>
        </div>
    </div>

    <label class="agree" for="check">
        <input type="checkbox" id="check" name="check">
        <span data-i18n="accept">I accept the Terms and Conditions</span>
    </label>

    <div id="msg" class="message error"></div>

    <button class="main-btn" type="button" id="mainBtn" onclick="handleAuth()" data-i18n="login">Login</button>
    <a class="toggle-link" id="toggleLink" onclick="toggleMode()" data-i18n="no_account">Don't have an account? Sign up</a>
</div>
<div class="creator" data-i18n="created_by">Created by It-Force © 2026</div>

<script>
// --- DICTIONARY ---
const dict = {
    en: { welcome: "Welcome Back", signin_sub: "Sign in to continue to your workspace.", create_acc: "Create Account", signup_sub: "Sign up to start managing your budget.", username: "Username", email: "Email", password: "Password", confirm_pass: "Confirm Password", show: "Show", hide: "Hide", pass_rule: "8+ chars, Uppercase, Lowercase, Number & Symbol.", accept: "I accept the Terms and Conditions", login: "Login", signup: "Sign Up", no_account: "Don't have an account? Sign up", has_account: "Already have an account? Login", created_by: "Created by It-Force © 2026", err_fill: "Fill all fields!", err_mail: "Invalid email!", err_cond: "Accept terms!", err_cred: "Invalid email or password!", err_match: "Passwords do not match!", success: "Success! Redirecting...", ph_user: "e.g., johndoe", ph_email: "name@example.com", ph_pass: "Enter your password" },
    fr: { welcome: "Bon retour", signin_sub: "Connectez-vous pour continuer.", create_acc: "Créer un compte", signup_sub: "Inscrivez-vous pour gérer votre budget.", username: "Nom d'utilisateur", email: "Email", password: "Mot de passe", confirm_pass: "Confirmer le mot de passe", show: "Afficher", hide: "Cacher", pass_rule: "8+ carac., Majuscule, Minuscule, Chiffre & Symbole.", accept: "J'accepte les conditions", login: "Se connecter", signup: "S'inscrire", no_account: "Pas de compte ? S'inscrire", has_account: "Déjà un compte ? Se connecter", created_by: "Créé par It-Force © 2026", err_fill: "Remplissez tout!", err_mail: "Email invalide!", err_cond: "Acceptez les conditions!", err_cred: "Email ou mot de passe invalide!", err_match: "Les mots de passe ne correspondent pas!", success: "Succès! Redirection...", ph_user: "ex: jeandupont", ph_email: "nom@exemple.com", ph_pass: "Votre mot de passe" },
    ar: { welcome: "مرحباً بعودتك", signin_sub: "سجل الدخول للمتابعة.", create_acc: "إنشاء حساب", signup_sub: "سجل لتبدأ في إدارة ميزانيتك.", username: "اسم المستخدم", email: "البريد الإلكتروني", password: "كلمة المرور", confirm_pass: "تأكيد كلمة المرور", show: "إظهار", hide: "إخفاء", pass_rule: "8+ أحرف، حرف كبير، صغير، رقم ورمز.", accept: "أوافق على الشروط والأحكام", login: "دخول", signup: "تسجيل", no_account: "ليس لديك حساب؟ سجل الآن", has_account: "لديك حساب؟ سجل الدخول", created_by: "تم الإنشاء بواسطة It-Force © 2026", err_fill: "املأ جميع الحقول!", err_mail: "بريد غير صالح!", err_cond: "اقبل الشروط!", err_cred: "بريد أو كلمة مرور خاطئة!", err_match: "كلمات المرور غير متطابقة!", success: "نجاح! جاري التوجيه...", ph_user: "مثال: ahmad123", ph_email: "name@example.com", ph_pass: "أدخل كلمة المرور" }
};

let currentLang = localStorage.getItem('appLang') || 'en';
let currentTheme = localStorage.getItem('appTheme') || 'light';
let isLoginMode = true;
const DB_KEY = "itwaveAppUsers";

// --- INIT ---
document.getElementById('langSelect').value = currentLang;
applyTheme(currentTheme);
changeLang(currentLang);
initDB();

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeIcon').innerText = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('appTheme', theme);
    currentTheme = theme;
}

function toggleTheme() {
    applyTheme(currentTheme === 'light' ? 'dark' : 'light');
}

function changeLang(lang) {
    currentLang = lang;
    localStorage.setItem('appLang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if(dict[lang][key]) el.innerText = dict[lang][key];
    });

    // Handle Placeholders
    document.getElementById('username').placeholder = dict[lang].ph_user;
    document.getElementById('email').placeholder = dict[lang].ph_email;
    document.getElementById('code').placeholder = dict[lang].ph_pass;
    document.getElementById('confirmCode').placeholder = dict[lang].ph_pass;

    if(!isLoginMode) {
        document.getElementById('formTitle').innerText = dict[lang].create_acc;
        document.getElementById('formSubtitle').innerText = dict[lang].signup_sub;
        document.getElementById('mainBtn').innerText = dict[lang].signup;
        document.getElementById('toggleLink').innerText = dict[lang].has_account;
    }
}

// --- AUTH LOGIC ---
function encryptPassword(password) { return btoa(unescape(encodeURIComponent(password))); }

async function initDB() {
    // Check if DB exists OR if it's the old broken version. "v2" forces a fresh load to fix the bug.
    if (!localStorage.getItem(DB_KEY) || localStorage.getItem("db_version") !== "v2") {
        try {
            const response = await fetch('./login-data.json');
            const data = await response.json();
            
            // Fix: Encrypt the plain text passwords from JSON before saving them to localStorage
            const secureRecords = data.loginRecords.map(user => ({
                ...user,
                password: encryptPassword(user.password)
            }));
            
            localStorage.setItem(DB_KEY, JSON.stringify(secureRecords));
            localStorage.setItem("db_version", "v2"); // Mark as fixed
        } catch (error) { 
            localStorage.setItem(DB_KEY, JSON.stringify([])); 
        }
    }
}

function togglePassword(inputId, btn) {
    let input = document.getElementById(inputId);
    let isHidden = input.type === "password";
    input.type = isHidden ? "text" : "password";
    btn.innerText = isHidden ? dict[currentLang].hide : dict[currentLang].show;
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById("msg").innerHTML = "";
    document.getElementById("usernameField").style.display = isLoginMode ? "none" : "block";
    document.getElementById("confirmPasswordField").style.display = isLoginMode ? "none" : "block";
    changeLang(currentLang); 
}

function handleAuth() {
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("code").value;
    let check = document.getElementById("check").checked;
    let msg = document.getElementById("msg");
    const d = dict[currentLang];

    try {
        if (!email || !password) throw new Error(d.err_fill);
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) throw new Error(d.err_mail);
        if (!check) throw new Error(d.err_cond);

        let usersDB = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
        let encryptedInput = encryptPassword(password);

        if (isLoginMode) {
            const user = usersDB.find(u => u.email === email && u.password === encryptedInput);
            if (!user) throw new Error(d.err_cred);
            completeLogin(user, msg, d.success);
        } else {
            let username = document.getElementById("username").value.trim();
            let confirmPass = document.getElementById("confirmCode").value;
            if (!username) throw new Error(d.err_fill);
            if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$/.test(password)) throw new Error(d.pass_rule);
            if (password !== confirmPass) throw new Error(d.err_match);
            if (usersDB.some(u => u.email === email)) throw new Error("Email exists");
            
            const newUser = { username, email, password: encryptedInput, role: "user", status: "active" };
            usersDB.push(newUser);
            localStorage.setItem(DB_KEY, JSON.stringify(usersDB)); 
            completeLogin(newUser, msg, d.success);
        }
    } catch (error) {
        msg.className = "message error";
        msg.innerHTML = error.message;
    }
}

function completeLogin(user, msgElement, customMsg) {
    const sessionUser = { ...user };
    delete sessionUser.password; 
    localStorage.setItem("currentUser", JSON.stringify(sessionUser));
    msgElement.className = "message success";
    msgElement.innerHTML = customMsg;
    setTimeout(() => { window.location.href = "./mainpage.html"; }, 1200);
}

document.addEventListener("keydown", e => { if (e.key === "Enter") handleAuth(); });
</script>
</body>
</html>

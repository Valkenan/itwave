<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير الميزانية الذكي - الهاكاثون</title>
    <style>
        /* إعدادات التصميم الأساسية - CSS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            /* لمنع خروج الحقل عن الإطار */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background-color: #e8f6f3;
            border-radius: 5px;
            display: none; /* مخفي افتراضياً حتى يتم الحساب */
        }
        .alert {
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .alert-warning {
            background-color: #fcf3cf;
            color: #b7950b;
            border-left: 5px solid #f1c40f;
        }
        .alert-danger {
            background-color: #fadbd8;
            color: #b03a2e;
            border-left: 5px solid #e74c3c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 مدير الميزانية الذكي</h1>
        <p style="text-align: center;">أدخل بياناتك لمعرفة وضعك المالي والحصول على نصائح للتوفير.</p>

        <div class="form-group">
            <label for="income">الدخل الشهري (بالدرهم):</label>
            <input type="number" id="income" placeholder="مثال: 5000">
        </div>
        
        <div class="form-group">
            <label for="rent">السكن والفواتير (كراء، ماء، كهرباء):</label>
            <input type="number" id="rent" placeholder="مثال: 1500">
        </div>
        <div class="form-group">
            <label for="food">مصاريف التغذية (القفة):</label>
            <input type="number" id="food" placeholder="مثال: 1500">
        </div>
        <div class="form-group">
 
            <label for="transport">مصاريف التنقل:</label>
            <input type="number" id="transport" placeholder="مثال: 500">
        </div>

        <button onclick="calculateBudget()">احسب الميزانية وقدم النصائح</button>
        <button type="button" onclick="goToLogin()">الرجوع إلى صفحة تسجيل الدخول / تسجيل الخروج</button>

        <div id="resultsArea" class="results">
            <h3>نتائج الميزانية:</h3>
            <p><strong>إجمالي المصاريف:</strong> 
            <span id="totalExpenses">0</span> درهم</p>
            <p><strong>المبلغ المتبقي:</strong> <span id="balance">0</span> درهم</p>
            
            <div id="suggestionsArea"></div>
        </div>
    </div>

    <script>
        // دالة يتم تشغيلها عند تحميل الصفحة لجلب البيانات السابقة إن وجدت
        window.onload = function() {
            loadSavedData();
        };

        function calculateBudget() {
            // 1. جلب القيم المدخلة
            const income = parseFloat(document.getElementById('income').value) || 0;
            const rent = parseFloat(document.getElementById('rent').value) || 0;
            const food = parseFloat(document.getElementById('food').value) || 0;
            const transport = parseFloat(document.getElementById('transport').value) || 0;
            
            if (income === 0) {
                alert("يرجى إدخال الدخل الشهري أولاً!");
                return;
            }

            // 2. العمليات الحسابية
            const totalExpenses = rent + food + transport;
            const balance = income - totalExpenses;

            // 3. عرض النتائج
            document.getElementById('totalExpenses').innerText = totalExpenses;
            document.getElementById('balance').innerText = balance;
            document.getElementById('resultsArea').style.display = 'block';

            // 4. توليد النصائح الذكية (Smart Suggestions)
            generateSuggestions(income, totalExpenses, food, transport);
            
            // 5. حفظ البيانات في المتصفح (LocalStorage)
            saveData(income, rent, food, transport);
        }

        function generateSuggestions(income, totalExpenses, food, transport) {
            const suggestionsArea = document.getElementById('suggestionsArea');
            suggestionsArea.innerHTML = '<h3>💡 نصائح ذكية للتوفير:</h3>'; // إعادة تعيين النصائح

            let hasSuggestions = false;
            
            // تحذير إذا كانت المصاريف تتجاوز الدخل أو قريبة منه
            if (totalExpenses > income) {
                suggestionsArea.innerHTML += `<div class="alert alert-danger">⚠️ تحذير: مصاريفك الحالية تتجاوز دخلك!
                يجب مراجعة نفقاتك بشكل عاجل.</div>`;
                hasSuggestions = true;
            }

            // نصيحة بخصوص التغذية (إذا تجاوزت 30% من الدخل)
            if (food > (income * 0.30)) {
                suggestionsArea.innerHTML += `<div class="alert alert-warning">🍲 مصاريف التغذية تبدو مرتفعة قليلاً.
                <strong>نصيحة:</strong> يمكنك تعويض اللحوم الحمراء بالقطاني (العدس/اللوبيا) مرتين في الأسبوع، مما سيوفر لك مئات الدراهم شهرياً.</div>`;
                hasSuggestions = true;
            }

            // نصيحة بخصوص التنقل (إذا تجاوز 10% من الدخل)
            if (transport > (income * 0.10)) {
                suggestionsArea.innerHTML += `<div class="alert alert-warning">🚌 مصاريف التنقل تأخذ جزءاً كبيراً من ميزانيتك.
                <strong>نصيحة:</strong> هل فكرت في الاشتراك الشهري للحافلات أو الترامواي بدلاً من سيارات الأجرة اليومية؟</div>`;
                hasSuggestions = true;
            }

            if (!hasSuggestions && totalExpenses < income) {
                suggestionsArea.innerHTML += `<div class="alert" style="background-color: #d5f5e3; color: #1d8348; border-left: 5px solid #2ecc71;">✅ ممتاز!
                مصاريفك في حدود المعقول. حاول تخصيص 20% من المبلغ المتبقي للادخار أو لحالات الطوارئ.</div>`;
            }
        }

        // دالة لحفظ البيانات (محدثة لربط البيانات بالمستخدم الحالي)
        function saveData(income, rent, food, transport) {
            const currentUser = localStorage.getItem("currentUser");
            if (!currentUser) return; // Prevent saving if not logged in

            const userData = { income, rent, food, transport };
            localStorage.setItem(`budgetData_${currentUser}`, JSON.stringify(userData));
        }

        // دالة لاسترجاع البيانات المحفوظة (محدثة للتحقق من الجلسة)
        function loadSavedData() {
            const currentUser = localStorage.getItem("currentUser");
            if (!currentUser) {
                // Enforce authentication: Redirect to login if accessed directly
                window.location.href = './home.html';
                return;
            }

            const savedData = localStorage.getItem(`budgetData_${currentUser}`);
            if (savedData) {
                const userData = JSON.parse(savedData);
                document.getElementById('income').value = userData.income || '';
                document.getElementById('rent').value = userData.rent || '';
                document.getElementById('food').value = userData.food || '';
                document.getElementById('transport').value = userData.transport || '';
            }
        }

        function goToLogin() {
            localStorage.removeItem("currentUser"); // Clear active session on logout
            window.location.href = './home.html';
        }
    </script>
</body>
</html>
